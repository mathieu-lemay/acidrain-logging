services:
  fastapi:
    build: ".."
    image: "acidrain-logging:dev"
    command: ["uvicorn", "--factory", "acidrain_logging.testing.fastapi:create_app"]
    environment:
      DD_ENV: "testing"
      DD_SERVICE: "test-fastapi"
      DD_VERSION: "0.0.0-dev"
      DD_TRACE_ENABLED: true
      UVICORN_HOST: "0.0.0.0"
      UVICORN_PORT: 8000
    ports:
      - 8000
  flask:
    build: ".."
    image: "acidrain-logging:dev"
    command: ["gunicorn", "--bind", ":8000", "acidrain_logging.testing.flask.main:app"]
    environment:
      DD_ENV: "testing"
      DD_SERVICE: "test-flask"
      DD_VERSION: "0.0.0-dev"
      DD_TRACE_ENABLED: true
    ports:
      - 8000
  worker:
    build: ".."
    image: "acidrain-logging:dev"
    command: ["celery", "-A", "acidrain_logging.testing.celery", "--quiet", "worker"]
    environment:
      DD_ENV: "testing"
      DD_SERVICE: "test-api"
      DD_VERSION: "0.0.0-dev"
      DD_TRACE_ENABLED: true
      OTEL_SERVICE_NAME: "test-celery"
      ACIDRAIN_OTEL_TRACE_EXPORTER: "console"
    user: nobody
    tmpfs:
      - /var/run/celery
    depends_on:
      - broker
  broker:
    # Pin to 3.x until kombu 5.7 is released
    # https://github.com/celery/celery/discussions/9639
    image: "rabbitmq:3-alpine"
