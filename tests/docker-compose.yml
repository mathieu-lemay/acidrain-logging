services:
  fastapi:
    build: ".."
    image: "acidrain-logging:dev"
    command: ["uvicorn", "--factory", "acidrain_logging.testing.fastapi:create_app"]
    environment:
      UVICORN_HOST: "0.0.0.0"
      UVICORN_PORT: 8000
      OTEL_RESOURCE_ATTRIBUTES: "service.name=test-fastapi,service.version=0.0.0-dev"
      ACIDRAIN_OTEL_SPAN_EXPORTER: "console"
    ports:
      - 8000
  flask:
    build: ".."
    image: "acidrain-logging:dev"
    command: ["gunicorn", "--bind", ":8000", "acidrain_logging.testing.flask.main:app"]
    environment:
      OTEL_RESOURCE_ATTRIBUTES: "service.name=test-flask,service.version=0.0.0-dev"
      ACIDRAIN_OTEL_SPAN_EXPORTER: "console"
    ports:
      - 8000
  worker:
    build: ".."
    image: "acidrain-logging:dev"
    command: ["celery", "-A", "acidrain_logging.testing.celery", "--quiet", "worker"]
    environment:
      OTEL_RESOURCE_ATTRIBUTES: "service.name=test-celery,service.version=0.0.0-dev"
      ACIDRAIN_OTEL_SPAN_EXPORTER: "console"
    user: nobody
    tmpfs:
      - /var/run/celery
    depends_on:
      - broker
  broker:
    # Pin to 3.x until kombu 5.7 is released
    # https://github.com/celery/celery/discussions/9639
    image: "rabbitmq:3-alpine"
